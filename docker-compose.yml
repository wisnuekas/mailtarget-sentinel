# VM / production compose — PostgreSQL & ClickHouse are external (set in .env).
#
# On VM:
#   cp .env.vm.example .env   # edit credentials & hosts
#   docker compose pull
#   docker compose up -d
#
# Local dev with ClickHouse container:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  sentinel:
    image: ${SENTINEL_IMAGE:-reg.mailtarget.dev/mailtarget/sentinel:${SENTINEL_TAG:-latest}}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      REDIS_ADDR: redis:6379
      SQLITE_PATH: /app/data/sentinel.db
    volumes:
      - sentinel_data:/app/data
    depends_on:
      redis:
        condition: service_started

  dashboard:
    image: ${DASHBOARD_IMAGE:-reg.mailtarget.dev/mailtarget/dashboard-sentinel:${SENTINEL_TAG:-latest}}
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - sentinel

volumes:
  redis_data:
  sentinel_data:
