# Local dev overlay — adds ClickHouse and points sentinel at the container.
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./scripts/clickhouse/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  sentinel:
    build: .
    image: reg.mailtarget.dev/mailtarget/sentinel:local
    environment:
      CLICKHOUSE_HOST: clickhouse:9000
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  clickhouse_data:
